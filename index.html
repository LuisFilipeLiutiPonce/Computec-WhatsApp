<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel WhatsApp — Computec Londrina</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  .tab-active  { border-bottom: 3px solid #facc15; color: #facc15; font-weight: 700; }
  .tab-inactive { color: rgba(255,255,255,0.65); border-bottom: 3px solid transparent; }
  .chip-active   { background: #0d2d6b !important; color: white !important; border-color: #0d2d6b !important; }
  .chip-inactive { background: #f1f5f9; color: #374151; border-color: #e2e8f0; }
  .order-card { transition: box-shadow .2s; }
  .order-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
  .pulse-red { animation: blink 1.8s infinite; }
  .modal-overlay { background: rgba(0,0,0,0.52); }
</style>
</head>
<body class="bg-slate-100 min-h-screen">

<!-- ======================== HEADER ======================== -->
<header style="background: linear-gradient(135deg,#0d2d6b 0%,#1a4a9f 100%);" class="shadow-xl">
  <div class="max-w-7xl mx-auto px-4 pt-3 pb-0 flex items-center justify-between">

    <!-- Logo -->
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-lg flex items-center justify-center shrink-0"
           style="background:#0a2259; border:2px solid rgba(255,255,255,.25);">
        <span class="text-white font-black text-xl select-none">C</span>
      </div>
      <div class="leading-tight">
        <div class="text-white font-black text-lg tracking-tight">Computec</div>
        <div class="text-blue-200 text-xs">Londrina</div>
      </div>
      <span class="hidden sm:block text-blue-300 text-sm ml-1">| Painel WhatsApp</span>
    </div>

    <!-- Alert badge -->
    <div id="headerAlertBadge"
         class="hidden items-center gap-2 bg-red-500 text-white px-3 py-1 rounded-full pulse-red text-sm font-bold cursor-default select-none">
      <span id="headerAlertCount">0</span>
      <span class="text-xs font-semibold">alerta(s) +24h</span>
    </div>
  </div>

  <!-- Tabs -->
  <div class="max-w-7xl mx-auto px-4 flex gap-0 mt-2">
    <button onclick="switchTab('pedidos')" id="tab-pedidos"
            class="tab-active px-6 py-3 text-sm transition-all">
      Pedidos Ativos
    </button>
    <button onclick="switchTab('estoque')" id="tab-estoque"
            class="tab-inactive px-6 py-3 text-sm transition-all">
      Aguardando Estoque
      <span id="stockTabBadge" class="hidden ml-1.5 bg-yellow-400 text-gray-900 text-xs font-bold px-2 py-0.5 rounded-full"></span>
    </button>
    <button onclick="switchTab('gerencial')" id="tab-gerencial"
            class="tab-inactive px-6 py-3 text-sm transition-all">
      Gerencial
    </button>
  </div>
</header>

<!-- ======================== MAIN ======================== -->
<main class="max-w-7xl mx-auto px-4 py-6">

  <!-- ===== TAB 1: PEDIDOS ATIVOS ===== -->
  <div id="tabPedidos">

    <!-- KPI Bar -->
    <div id="kpiBar" class="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-6 gap-3 mb-5"></div>

    <!-- Filter Bar -->
    <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-4 mb-5">
      <div class="flex flex-wrap gap-3 items-center">
        <div class="relative flex-1 min-w-[180px]">
          <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4"></i>
          <input id="searchInput" type="text" placeholder="Buscar cliente ou empresa..."
                 class="w-full pl-9 pr-3 py-2 border border-gray-200 rounded-lg text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-200"
                 oninput="renderPedidos()">
        </div>
        <button onclick="openModalPedido()"
                style="background:#0d2d6b;"
                class="text-white px-4 py-2 rounded-lg text-sm font-semibold hover:opacity-90
                       flex items-center gap-1.5 whitespace-nowrap shrink-0">
          <i data-lucide="plus" class="w-4 h-4"></i> Novo Pedido
        </button>
      </div>

      <!-- Vendedora chips -->
      <div class="mt-3">
        <div class="text-[11px] text-gray-400 font-semibold uppercase tracking-widest mb-1.5">Vendedora</div>
        <div id="vendedoraChips" class="flex flex-wrap gap-2"></div>
      </div>

      <!-- Status chips -->
      <div class="mt-3">
        <div class="text-[11px] text-gray-400 font-semibold uppercase tracking-widest mb-1.5">Status</div>
        <div id="statusChips" class="flex flex-wrap gap-2"></div>
      </div>
    </div>

    <!-- Order List -->
    <div id="orderList"></div>
  </div>

  <!-- ===== TAB 2: AGUARDANDO ESTOQUE ===== -->
  <div id="tabEstoque" class="hidden">
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-xl font-black text-gray-800">Aguardando Estoque</h2>
      <button onclick="openModalEstoque()"
              style="background:#0d2d6b;"
              class="text-white px-4 py-2 rounded-lg text-sm font-semibold hover:opacity-90 flex items-center gap-1.5">
        <i data-lucide="plus" class="w-4 h-4"></i> Adicionar
      </button>
    </div>
    <div id="stockList"></div>
  </div>

  <!-- ===== TAB 3: GERENCIAL ===== -->
  <div id="tabGerencial" class="hidden">
    <!-- KPIs gerenciais -->
    <div id="gerencialKpis" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-5"></div>

    <!-- Bar chart -->
    <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-6 mb-5">
      <h3 class="text-base font-black text-gray-800 mb-4">Pedidos Ativos por Vendedora</h3>
      <div id="vendedoraChart"></div>
    </div>

    <!-- Alerts -->
    <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-6 mb-5">
      <h3 class="text-base font-black text-gray-800 mb-4 flex items-center gap-2">
        <i data-lucide="alert-triangle" class="w-5 h-5 text-red-500"></i>
        Alertas — +24h sem movimentação
      </h3>
      <div id="gerencialAlertList"></div>
    </div>

    <!-- Premium -->
    <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-6">
      <h3 class="text-base font-black text-gray-800 mb-4 flex items-center gap-2">
        <span>⭐</span> Pedidos Premium Ativos
      </h3>
      <div id="gerencialPremiumList"></div>
    </div>
  </div>

</main>

<!-- ======================== MODAL: PEDIDO ======================== -->
<div id="modalPedido" class="fixed inset-0 z-50 hidden items-center justify-center modal-overlay p-4">
  <div class="bg-white rounded-2xl w-full max-w-lg max-h-[92vh] flex flex-col shadow-2xl">
    <!-- header -->
    <div style="background:#0d2d6b;" class="text-white px-6 py-4 rounded-t-2xl flex items-center justify-between shrink-0">
      <h3 id="modalPedidoTitle" class="font-bold text-lg">Novo Pedido</h3>
      <button onclick="closeModalPedido()" class="hover:text-blue-200 transition-colors">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
    </div>
    <!-- body -->
    <div class="overflow-y-auto p-6 flex-1">
      <div class="space-y-4">

        <!-- Tipo + Premium -->
        <div class="flex gap-4 flex-wrap">
          <div class="flex-1 min-w-[140px]">
            <label class="block text-xs font-semibold text-gray-600 mb-1 uppercase tracking-wide">Tipo</label>
            <select id="fpTipo" onchange="toggleEmpresaField()"
                    class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200">
              <option value="PF">PF — Pessoa Física</option>
              <option value="PJ">PJ — Pessoa Jurídica</option>
            </select>
          </div>
          <div id="premiumWrap" class="hidden flex items-end pb-2">
            <label class="flex items-center gap-2 cursor-pointer select-none">
              <input type="checkbox" id="fpPremium" class="w-4 h-4 rounded accent-yellow-400">
              <span class="text-sm font-semibold text-gray-700">⭐ PJ Premium</span>
            </label>
          </div>
        </div>

        <!-- Cliente -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1 uppercase tracking-wide">Nome do Cliente *</label>
          <input id="fpCliente" type="text" placeholder="Nome completo"
                 class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200"
                 oninput="validatePedidoForm()">
        </div>

        <!-- Empresa (só PJ) -->
        <div id="empresaWrap" class="hidden">
          <label class="block text-xs font-semibold text-gray-600 mb-1 uppercase tracking-wide">Empresa</label>
          <input id="fpEmpresa" type="text" placeholder="Razão social ou nome fantasia"
                 class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200">
        </div>

        <!-- Telefone -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1 uppercase tracking-wide">Telefone WhatsApp</label>
          <input id="fpTelefone" type="text" placeholder="(43) 99999-9999"
                 class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200">
        </div>

        <!-- Vendedora -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1 uppercase tracking-wide">Vendedora *</label>
          <select id="fpVendedora" onchange="validatePedidoForm()"
                  class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200">
            <option value="">Selecione a vendedora...</option>
          </select>
        </div>

        <!-- Valor -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1 uppercase tracking-wide">Valor R$</label>
          <input id="fpValor" type="text" placeholder="0,00"
                 class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200">
        </div>

        <!-- Status -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1 uppercase tracking-wide">Status</label>
          <select id="fpStatus"
                  class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200">
          </select>
        </div>

        <!-- Descrição -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1 uppercase tracking-wide">Descrição do Pedido</label>
          <textarea id="fpDescricao" rows="3" placeholder="Descreva os produtos e quantidades..."
                    class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200 resize-none"></textarea>
        </div>
      </div>
    </div>
    <!-- footer -->
    <div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3 shrink-0">
      <button onclick="closeModalPedido()"
              class="px-4 py-2 border border-gray-200 rounded-lg text-sm text-gray-600 hover:bg-gray-50">
        Cancelar
      </button>
      <button id="btnSalvarPedido" onclick="salvarPedido()" disabled
              style="background:#0d2d6b;"
              class="text-white px-5 py-2 rounded-lg text-sm font-semibold hover:opacity-90
                     disabled:opacity-40 disabled:cursor-not-allowed">
        Criar Pedido
      </button>
    </div>
  </div>
</div>

<!-- ======================== MODAL: ESTOQUE ======================== -->
<div id="modalEstoque" class="fixed inset-0 z-50 hidden items-center justify-center modal-overlay p-4">
  <div class="bg-white rounded-2xl w-full max-w-md max-h-[92vh] flex flex-col shadow-2xl">
    <div style="background:#0d2d6b;" class="text-white px-6 py-4 rounded-t-2xl flex items-center justify-between shrink-0">
      <h3 class="font-bold text-lg">Adicionar — Aguardando Estoque</h3>
      <button onclick="closeModalEstoque()" class="hover:text-blue-200 transition-colors">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
    </div>
    <div class="overflow-y-auto p-6 flex-1">
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1 uppercase tracking-wide">Cliente *</label>
          <input id="feCliente" type="text" placeholder="Nome do cliente"
                 class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200"
                 oninput="validateEstoqueForm()">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1 uppercase tracking-wide">Telefone</label>
          <input id="feTelefone" type="text" placeholder="(43) 99999-9999"
                 class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1 uppercase tracking-wide">Produto Desejado *</label>
          <input id="feProduto" type="text" placeholder="Ex: Toner HP 85A"
                 class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200"
                 oninput="validateEstoqueForm()">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1 uppercase tracking-wide">Vendedora</label>
          <select id="feVendedora"
                  class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200">
            <option value="">Selecione...</option>
          </select>
        </div>
      </div>
    </div>
    <div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3 shrink-0">
      <button onclick="closeModalEstoque()"
              class="px-4 py-2 border border-gray-200 rounded-lg text-sm text-gray-600 hover:bg-gray-50">
        Cancelar
      </button>
      <button id="btnSalvarEstoque" onclick="salvarEstoque()" disabled
              style="background:#0d2d6b;"
              class="text-white px-5 py-2 rounded-lg text-sm font-semibold hover:opacity-90
                     disabled:opacity-40 disabled:cursor-not-allowed">
        Adicionar
      </button>
    </div>
  </div>
</div>

<!-- ======================== SCRIPT ======================== -->
<script>
/* ─────────────── CONSTANTS ─────────────── */
const VENDEDORAS = ["Veridiane","Maria Luiza","Mislaine","Simone","Erika"];

const STATUS = {
  atendimento:            { label:"Em Atendimento",       cor:"#6b7280" },
  aguardando_resposta:    { label:"Aguardando Resposta",  cor:"#f59e0b" },
  aguardando_estoque:     { label:"Aguardando Estoque",   cor:"#3b82f6" },
  aguardando_confirmacao: { label:"Aguard. Confirmação",  cor:"#f97316" },
  confirmado:             { label:"Pedido Confirmado",    cor:"#22c55e" },
  entrega_pendente:       { label:"Entrega Pendente",     cor:"#2563eb" },
  finalizado:             { label:"Finalizado",           cor:"#16a34a" },
};

const KPI_KEYS = ["atendimento","aguardando_resposta","aguardando_estoque",
                  "aguardando_confirmacao","confirmado","entrega_pendente"];

/* ─────────────── STATE ─────────────── */
let pedidos  = [];
let estoque  = [];
let editId   = null;
let fVend    = "Todas";
let fStat    = "Todos";

/* ─────────────── PERSISTENCE ─────────────── */
const save = () => {
  localStorage.setItem("ped_computec", JSON.stringify(pedidos));
  localStorage.setItem("est_computec", JSON.stringify(estoque));
};

const load = () => {
  try { pedidos = JSON.parse(localStorage.getItem("ped_computec")) || []; } catch(e){ pedidos=[]; }
  try { estoque = JSON.parse(localStorage.getItem("est_computec")) || []; } catch(e){ estoque=[]; }
};

/* ─────────────── UTILS ─────────────── */
const fmt = iso => iso ? new Date(iso).toLocaleDateString("pt-BR") : "—";
const hours = iso => iso ? (Date.now() - new Date(iso))/3600000 : 0;
const isAlert = p => !["finalizado","confirmado"].includes(p.status) && hours(p.atualizadoEm) >= 24;
const rgb = hex => { const n=parseInt(hex.slice(1),16); return `${(n>>16)&255},${(n>>8)&255},${n&255}`; };

/* ─────────────── TABS ─────────────── */
function switchTab(t) {
  ["pedidos","estoque","gerencial"].forEach(x => {
    const cap = x[0].toUpperCase()+x.slice(1);
    document.getElementById("tab"+cap).classList.add("hidden");
    document.getElementById("tab-"+x).className =
      "tab-inactive px-6 py-3 text-sm transition-all";
  });
  const cap = t[0].toUpperCase()+t.slice(1);
  document.getElementById("tab"+cap).classList.remove("hidden");
  document.getElementById("tab-"+t).className =
    "tab-active px-6 py-3 text-sm transition-all";
  if (t === "gerencial") renderGerencial();
}

/* ─────────────── KPI BAR ─────────────── */
function renderKpiBar() {
  document.getElementById("kpiBar").innerHTML = KPI_KEYS.map(k => {
    const cfg = STATUS[k];
    const n = pedidos.filter(p => p.status===k).length;
    return `
    <div class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden cursor-pointer
                hover:shadow-md transition-shadow" onclick="jumpStatus('${k}')">
      <div style="background:${cfg.cor};height:4px;"></div>
      <div class="p-4">
        <div class="text-3xl font-black text-gray-800">${n}</div>
        <div class="text-[11px] text-gray-500 mt-1 leading-snug">${cfg.label}</div>
      </div>
    </div>`;
  }).join("");
}

function jumpStatus(k) {
  fStat = k; renderChips(); renderPedidos();
  if (document.getElementById("tabPedidos").classList.contains("hidden")) switchTab("pedidos");
}

/* ─────────────── CHIPS ─────────────── */
function renderChips() {
  document.getElementById("vendedoraChips").innerHTML =
    ["Todas",...VENDEDORAS].map(v =>
      `<button onclick="setFV('${v}')"
        class="chip px-3 py-1 rounded-full text-xs font-semibold border transition-all
               ${fVend===v?"chip-active":"chip-inactive hover:border-gray-400"}">${v}</button>`
    ).join("");

  document.getElementById("statusChips").innerHTML =
    ["Todos",...Object.keys(STATUS)].map(s => {
      const label = s==="Todos" ? "Todos" : STATUS[s].label;
      return `<button onclick="setFS('${s}')"
        class="chip px-3 py-1 rounded-full text-xs font-semibold border transition-all
               ${fStat===s?"chip-active":"chip-inactive hover:border-gray-400"}">${label}</button>`;
    }).join("");
}
const setFV = v => { fVend=v; renderChips(); renderPedidos(); };
const setFS = s => { fStat=s; renderChips(); renderPedidos(); };

/* ─────────────── PEDIDO CARD ─────────────── */
function cardPedido(p) {
  const cfg    = STATUS[p.status] || STATUS.atendimento;
  const alerta = isAlert(p);
  const borda  = alerta ? "#ef4444" : cfg.cor;
  const h      = Math.floor(hours(p.atualizadoEm));

  const bPremium = p.premium
    ? `<span class="text-[11px] px-2 py-0.5 rounded-full font-semibold"
             style="background:#fef9c3;border:1px solid #fde047;color:#854d0e;">⭐ Premium</span>` : "";
  const bPJ = (p.tipo==="PJ" && !p.premium)
    ? `<span class="text-[11px] px-2 py-0.5 rounded-full font-semibold"
             style="background:#dbeafe;border:1px solid #93c5fd;color:#1e40af;">PJ</span>` : "";
  const bAlert = alerta
    ? `<span class="text-[11px] px-2 py-0.5 rounded-full font-semibold"
             style="background:#fee2e2;border:1px solid #fca5a5;color:#dc2626;">${h}h sem mov.</span>` : "";

  const opts = Object.entries(STATUS).map(([id,c]) =>
    `<option value="${id}" ${p.status===id?"selected":""}>${c.label}</option>`).join("");

  return `
  <div class="order-card bg-white rounded-xl border border-slate-100 shadow-sm mb-3 overflow-hidden"
       style="border-left:4px solid ${borda};">
    <div class="p-4">
      <div class="flex items-start gap-4">
        <!-- left -->
        <div class="flex-1 min-w-0">
          <div class="flex flex-wrap items-center gap-1.5 mb-1">
            <span class="font-bold text-gray-900">${escHtml(p.cliente)}</span>
            ${bPremium}${bPJ}${bAlert}
          </div>
          ${p.empresa ? `<div class="text-sm text-gray-600 mb-0.5"><span class="font-semibold">Empresa:</span> ${escHtml(p.empresa)}</div>` : ""}
          <div class="flex flex-wrap gap-x-4 gap-y-0.5 text-sm text-gray-500">
            ${p.telefone ? `<span class="flex items-center gap-1"><i data-lucide="phone" class="w-3 h-3"></i>${escHtml(p.telefone)}</span>` : ""}
            <span class="flex items-center gap-1"><i data-lucide="user" class="w-3 h-3"></i>${escHtml(p.vendedora)}</span>
            ${p.valor ? `<span class="font-semibold text-emerald-700">R$ ${escHtml(p.valor)}</span>` : ""}
            <span class="flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i>${fmt(p.criadoEm)}</span>
          </div>
          ${p.descricao ? `<div class="text-sm italic text-gray-400 mt-1.5">${escHtml(p.descricao)}</div>` : ""}
        </div>
        <!-- right -->
        <div class="flex flex-col items-end gap-2 shrink-0">
          <!-- status badge -->
          <div class="flex items-center gap-1.5 px-2 py-1 rounded-full text-[11px] font-semibold"
               style="background:rgba(${rgb(cfg.cor)},.1);border:1px solid rgba(${rgb(cfg.cor)},.35);color:${cfg.cor};">
            <span class="w-2 h-2 rounded-full inline-block" style="background:${cfg.cor};"></span>
            ${cfg.label}
          </div>
          <!-- inline select -->
          <select id="sel-${p.id}"
                  class="text-xs border border-gray-200 bg-gray-50 rounded-lg px-2 py-1
                         focus:outline-none focus:ring-1 focus:ring-blue-200">
            ${opts}
          </select>
          <!-- actions -->
          <div class="flex gap-2">
            <button onclick="openModalPedido(${p.id})"
                    class="text-gray-300 hover:text-blue-600 transition-colors" title="Editar">
              <i data-lucide="pencil" class="w-4 h-4"></i>
            </button>
            <button onclick="deletePedido(${p.id})"
                    class="text-gray-300 hover:text-red-500 transition-colors" title="Excluir">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

/* ─────────────── RENDER PEDIDOS ─────────────── */
function renderPedidos() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  let list = pedidos.filter(p => {
    const ms = !q || p.cliente.toLowerCase().includes(q) || (p.empresa||"").toLowerCase().includes(q);
    const mv = fVend==="Todas" || p.vendedora===fVend;
    const mst= fStat==="Todos" || p.status===fStat;
    return ms && mv && mst;
  }).sort((a,b) => new Date(b.criadoEm)-new Date(a.criadoEm));

  const el = document.getElementById("orderList");
  if (!list.length) {
    el.innerHTML = `
    <div class="text-center py-16 text-gray-400">
      <i data-lucide="inbox" class="w-16 h-16 mx-auto mb-4 opacity-30"></i>
      <div class="text-xl font-black text-gray-400 mb-1">Nenhum pedido encontrado</div>
      <div class="text-sm">Clique em <strong>Novo Pedido</strong> para começar</div>
    </div>`;
    lucide.createIcons(); return;
  }
  el.innerHTML = list.map(cardPedido).join("");
  lucide.createIcons();
  list.forEach(p => {
    const s = document.getElementById("sel-"+p.id);
    if (s) s.addEventListener("change", e => updateStatus(p.id, e.target.value));
  });
}

function updateStatus(id, ns) {
  const p = pedidos.find(x=>x.id===id); if (!p) return;
  p.status = ns; p.atualizadoEm = new Date().toISOString();
  save(); renderAll();
}

function deletePedido(id) {
  const p = pedidos.find(x=>x.id===id); if (!p) return;
  if (!confirm(`Excluir o pedido de "${p.cliente}"?`)) return;
  pedidos = pedidos.filter(x=>x.id!==id);
  save(); renderAll();
}

/* ─────────────── RENDER ESTOQUE ─────────────── */
function renderEstoque() {
  const el = document.getElementById("stockList");
  if (!estoque.length) {
    el.innerHTML = `
    <div class="text-center py-16 text-gray-400">
      <i data-lucide="package" class="w-16 h-16 mx-auto mb-4 opacity-30"></i>
      <div class="text-xl font-black text-gray-400 mb-1">Nenhum item aguardando</div>
      <div class="text-sm">Clique em <strong>Adicionar</strong> para registrar</div>
    </div>`;
    lucide.createIcons();
  } else {
    el.innerHTML = estoque.map(e => `
    <div class="bg-white rounded-xl border border-slate-100 shadow-sm mb-3 overflow-hidden"
         style="border-left:4px solid #3b82f6;">
      <div class="p-4 flex items-start justify-between gap-4">
        <div class="flex-1 min-w-0">
          <div class="font-bold text-gray-900 mb-1">${escHtml(e.cliente)}</div>
          <div class="flex flex-wrap gap-x-4 gap-y-0.5 text-sm text-gray-500">
            ${e.telefone ? `<span class="flex items-center gap-1"><i data-lucide="phone" class="w-3 h-3"></i>${escHtml(e.telefone)}</span>` : ""}
            <span class="flex items-center gap-1 font-semibold text-gray-700">
              <i data-lucide="package" class="w-3 h-3"></i>${escHtml(e.produto)}
            </span>
            ${e.vendedora ? `<span class="flex items-center gap-1"><i data-lucide="user" class="w-3 h-3"></i>${escHtml(e.vendedora)}</span>` : ""}
            <span class="flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i>${fmt(e.criadoEm)}</span>
          </div>
        </div>
        <button onclick="removeEstoque(${e.id})"
                class="flex items-center gap-1.5 bg-emerald-500 hover:bg-emerald-600 text-white
                       text-xs font-semibold px-3 py-2 rounded-lg transition-colors shrink-0">
          <i data-lucide="check" class="w-3 h-3"></i> Produto chegou
        </button>
      </div>
    </div>`).join("");
    lucide.createIcons();
  }

  // stock tab badge
  const b = document.getElementById("stockTabBadge");
  if (estoque.length) { b.textContent=`(${estoque.length})`; b.classList.remove("hidden"); }
  else                { b.classList.add("hidden"); }
}

function removeEstoque(id) {
  estoque = estoque.filter(x=>x.id!==id);
  save(); renderEstoque(); updateHeaderAlert();
  if (!document.getElementById("tabGerencial").classList.contains("hidden")) renderGerencial();
}

/* ─────────────── RENDER GERENCIAL ─────────────── */
function renderGerencial() {
  const ativos     = pedidos.filter(p=>p.status!=="finalizado");
  const alertas    = pedidos.filter(isAlert);
  const finalizados= pedidos.filter(p=>p.status==="finalizado");

  // 4 KPIs
  document.getElementById("gerencialKpis").innerHTML = `
  <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-6">
    <div class="text-4xl font-black text-blue-700">${ativos.length}</div>
    <div class="text-sm text-gray-500 mt-1 font-semibold">Pedidos Ativos</div>
  </div>
  <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-6">
    <div class="text-4xl font-black text-red-500">${alertas.length}</div>
    <div class="text-sm text-gray-500 mt-1 font-semibold">Alertas +24h</div>
  </div>
  <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-6">
    <div class="text-4xl font-black text-yellow-500">${estoque.length}</div>
    <div class="text-sm text-gray-500 mt-1 font-semibold">Aguardando Estoque</div>
  </div>
  <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-6">
    <div class="text-4xl font-black text-emerald-600">${finalizados.length}</div>
    <div class="text-sm text-gray-500 mt-1 font-semibold">Finalizados</div>
  </div>`;

  // Bar chart
  const counts = VENDEDORAS.map(v => ativos.filter(p=>p.vendedora===v).length);
  const max = Math.max(...counts, 1);
  document.getElementById("vendedoraChart").innerHTML = VENDEDORAS.map((v,i) => {
    const n = counts[i];
    const al= ativos.filter(p=>p.vendedora===v && isAlert(p)).length;
    const pct = Math.round(n/max*100);
    return `
    <div class="flex items-center gap-3 mb-3">
      <div class="w-28 text-sm font-semibold text-gray-700 shrink-0 truncate">${v}</div>
      <div class="flex-1 bg-gray-100 rounded-full h-7 overflow-hidden">
        <div style="width:${pct}%;background:#0d2d6b;" class="h-full rounded-full transition-all duration-500"></div>
      </div>
      <div class="text-sm font-black text-gray-800 w-5 text-right shrink-0">${n}</div>
      ${al>0?`<span class="bg-red-100 text-red-600 text-[11px] font-bold px-2 py-0.5 rounded-full border border-red-200 shrink-0">${al}⚠</span>`:""}
    </div>`;
  }).join("");

  // Alerts list
  document.getElementById("gerencialAlertList").innerHTML = !alertas.length
    ? `<div class="text-center py-8 text-gray-400 font-semibold">Nenhum alerta ✓</div>`
    : alertas.map(p => {
      const h=Math.floor(hours(p.atualizadoEm));
      return `
      <div class="flex items-center justify-between p-3 bg-red-50 border border-red-100 rounded-xl mb-2">
        <div>
          <span class="font-bold text-gray-900">${escHtml(p.cliente)}</span>
          <span class="text-xs text-red-500 font-semibold ml-2">${h}h sem movimentação</span>
          <div class="text-xs text-gray-500 mt-0.5">${escHtml(p.vendedora)} · ${STATUS[p.status]?.label||""}</div>
        </div>
        <button onclick="openModalPedido(${p.id})" style="background:#0d2d6b;"
                class="text-white text-xs px-3 py-1.5 rounded-lg font-semibold hover:opacity-90">
          Editar
        </button>
      </div>`;
    }).join("");

  // Premium list
  const prems = pedidos.filter(p=>p.premium && p.status!=="finalizado");
  document.getElementById("gerencialPremiumList").innerHTML = !prems.length
    ? `<div class="text-center py-8 text-gray-400 font-semibold">Nenhum pedido premium ativo</div>`
    : prems.map(p => {
      const cfg=STATUS[p.status];
      return `
      <div class="flex items-center justify-between p-3 bg-yellow-50 border border-yellow-100 rounded-xl mb-2">
        <div>
          <span class="font-bold text-gray-900">⭐ ${escHtml(p.cliente)}</span>
          ${p.empresa?`<span class="text-xs text-gray-500 ml-2">${escHtml(p.empresa)}</span>`:""}
          <div class="text-xs text-gray-500 mt-0.5">${escHtml(p.vendedora)}${p.telefone?" · "+escHtml(p.telefone):""}</div>
        </div>
        <div class="flex items-center gap-1.5 px-2 py-1 rounded-full text-[11px] font-semibold"
             style="background:rgba(${rgb(cfg.cor)},.1);border:1px solid rgba(${rgb(cfg.cor)},.4);color:${cfg.cor};">
          <span class="w-2 h-2 rounded-full" style="background:${cfg.cor};"></span>
          ${cfg.label}
        </div>
      </div>`;
    }).join("");

  lucide.createIcons();
}

/* ─────────────── HEADER ALERT ─────────────── */
function updateHeaderAlert() {
  const n = pedidos.filter(isAlert).length;
  const el = document.getElementById("headerAlertBadge");
  document.getElementById("headerAlertCount").textContent = n;
  if (n>0) { el.classList.remove("hidden"); el.classList.add("flex"); }
  else     { el.classList.add("hidden");    el.classList.remove("flex"); }
}

/* ─────────────── MODAL PEDIDO ─────────────── */
function populateSelects() {
  const vOpts = VENDEDORAS.map(v=>`<option value="${v}">${v}</option>`).join("");
  document.getElementById("fpVendedora").innerHTML = `<option value="">Selecione a vendedora...</option>${vOpts}`;
  document.getElementById("feVendedora").innerHTML = `<option value="">Selecione...</option>${vOpts}`;
  document.getElementById("fpStatus").innerHTML =
    Object.entries(STATUS).map(([id,c])=>`<option value="${id}">${c.label}</option>`).join("");
}

function openModalPedido(id=null) {
  editId = id;
  const btn = document.getElementById("btnSalvarPedido");
  const ttl = document.getElementById("modalPedidoTitle");

  if (id) {
    const p = pedidos.find(x=>x.id===id); if (!p) return;
    ttl.textContent = "Editar Pedido"; btn.textContent = "Salvar Alterações";
    document.getElementById("fpTipo").value      = p.tipo;
    document.getElementById("fpCliente").value   = p.cliente;
    document.getElementById("fpEmpresa").value   = p.empresa||"";
    document.getElementById("fpTelefone").value  = p.telefone||"";
    document.getElementById("fpVendedora").value = p.vendedora;
    document.getElementById("fpValor").value     = p.valor||"";
    document.getElementById("fpStatus").value    = p.status;
    document.getElementById("fpDescricao").value = p.descricao||"";
    document.getElementById("fpPremium").checked = !!p.premium;
  } else {
    ttl.textContent = "Novo Pedido"; btn.textContent = "Criar Pedido";
    document.getElementById("fpTipo").value      = "PF";
    document.getElementById("fpCliente").value   = "";
    document.getElementById("fpEmpresa").value   = "";
    document.getElementById("fpTelefone").value  = "";
    document.getElementById("fpVendedora").value = "";
    document.getElementById("fpValor").value     = "";
    document.getElementById("fpStatus").value    = "atendimento";
    document.getElementById("fpDescricao").value = "";
    document.getElementById("fpPremium").checked = false;
  }
  toggleEmpresaField(); validatePedidoForm();
  show("modalPedido");
}

function closeModalPedido() { hide("modalPedido"); editId=null; }

function toggleEmpresaField() {
  const pj = document.getElementById("fpTipo").value==="PJ";
  pj ? document.getElementById("empresaWrap").classList.remove("hidden")
     : document.getElementById("empresaWrap").classList.add("hidden");
  pj ? document.getElementById("premiumWrap").classList.remove("hidden")
     : document.getElementById("premiumWrap").classList.add("hidden");
  if (!pj) document.getElementById("fpPremium").checked=false;
}

function validatePedidoForm() {
  const ok = document.getElementById("fpCliente").value.trim() &&
             document.getElementById("fpVendedora").value;
  document.getElementById("btnSalvarPedido").disabled = !ok;
}

function salvarPedido() {
  const tipo      = document.getElementById("fpTipo").value;
  const cliente   = document.getElementById("fpCliente").value.trim();
  const empresa   = document.getElementById("fpEmpresa").value.trim();
  const telefone  = document.getElementById("fpTelefone").value.trim();
  const vendedora = document.getElementById("fpVendedora").value;
  const valor     = document.getElementById("fpValor").value.trim();
  const status    = document.getElementById("fpStatus").value;
  const descricao = document.getElementById("fpDescricao").value.trim();
  const premium   = document.getElementById("fpPremium").checked;
  if (!cliente||!vendedora) return;
  const now = new Date().toISOString();
  if (editId) {
    const p = pedidos.find(x=>x.id===editId);
    if (p) Object.assign(p,{tipo,cliente,empresa,telefone,vendedora,valor,status,descricao,premium,atualizadoEm:now});
  } else {
    pedidos.push({id:Date.now(),tipo,cliente,empresa,telefone,vendedora,status,descricao,valor,premium,criadoEm:now,atualizadoEm:now});
  }
  save(); closeModalPedido(); renderAll();
}

/* ─────────────── MODAL ESTOQUE ─────────────── */
function openModalEstoque() {
  ["feCliente","feTelefone","feProduto"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("feVendedora").value="";
  validateEstoqueForm(); show("modalEstoque");
}
function closeModalEstoque() { hide("modalEstoque"); }

function validateEstoqueForm() {
  const ok = document.getElementById("feCliente").value.trim() &&
             document.getElementById("feProduto").value.trim();
  document.getElementById("btnSalvarEstoque").disabled = !ok;
}

function salvarEstoque() {
  const cliente  = document.getElementById("feCliente").value.trim();
  const telefone = document.getElementById("feTelefone").value.trim();
  const produto  = document.getElementById("feProduto").value.trim();
  const vendedora= document.getElementById("feVendedora").value;
  if (!cliente||!produto) return;
  estoque.push({id:Date.now(),cliente,telefone,produto,vendedora,criadoEm:new Date().toISOString()});
  save(); closeModalEstoque(); renderEstoque(); updateHeaderAlert();
  if (!document.getElementById("tabGerencial").classList.contains("hidden")) renderGerencial();
}

/* ─────────────── HELPERS ─────────────── */
function show(id) {
  document.getElementById(id).classList.remove("hidden");
  document.getElementById(id).classList.add("flex");
}
function hide(id) {
  document.getElementById(id).classList.add("hidden");
  document.getElementById(id).classList.remove("flex");
}
function escHtml(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ─────────────── RENDER ALL ─────────────── */
function renderAll() {
  renderKpiBar(); renderChips(); renderPedidos(); renderEstoque(); updateHeaderAlert(); lucide.createIcons();
}

/* ─────────────── CLOSE MODALS ON OVERLAY CLICK ─────────────── */
["modalPedido","modalEstoque"].forEach(id => {
  document.getElementById(id).addEventListener("click", e => {
    if (e.target === document.getElementById(id)) {
      id==="modalPedido" ? closeModalPedido() : closeModalEstoque();
    }
  });
});

/* ─────────────── INIT ─────────────── */
document.addEventListener("DOMContentLoaded", () => {
  load(); populateSelects(); renderAll();
});
</script>
</body>
</html>
